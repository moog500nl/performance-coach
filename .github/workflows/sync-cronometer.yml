# .github/workflows/sync-cronometer.yml
#
# Runs sync_cronometer.py whenever Cronometer CSV exports are pushed
# to the cronometer/ directory, then commits the updated nutrition.json
# back to the repository.
#
# Mirrors the pattern of the existing intervals.icu sync workflow.
 
name: Sync Cronometer → nutrition.json
 
on:
  push:
    paths:
      - "cronometer/**.csv"   # triggers only when CSVs are added or updated
 
  workflow_dispatch:           # allows manual trigger from GitHub Actions UI
 
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit nutrition.json back to repo
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Run sync_cronometer.py
        run: python sync_cronometer.py
 
      - name: Commit updated nutrition.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nutrition.json
          # Only commit if nutrition.json actually changed
          git diff --staged --quiet || git commit -m "sync: update nutrition.json from Cronometer export [skip ci]"
          git push